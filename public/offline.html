<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — AgentBio</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #f9fafb;
        color: #111827;
      }
      .card {
        max-width: 28rem;
        margin: 1rem;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #6b7280;
        line-height: 1.5;
      }
      button {
        margin-top: 1.5rem;
        padding: 0.625rem 1.25rem;
        font-size: 0.95rem;
        font-weight: 600;
        color: #fff;
        background: #2563eb;
        border: 0;
        border-radius: 0.5rem;
        cursor: pointer;
      }
      button:hover {
        background: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        AgentBio can't reach the network right now. Previously visited pages
        may still work. Check your connection and try again.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>

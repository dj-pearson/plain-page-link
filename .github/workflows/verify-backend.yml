name: Verify Backend

# Verifies the parts of the PRD that cannot be exercised by the frontend
# typecheck/test/build pipeline: the Deno edge functions and the SQL migrations.
# These run against URL-imported dependencies (deno.land / esm.sh) that are only
# reachable from GitHub-hosted runners, so this is the authoritative verification
# path for those items.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge-functions:
    name: Edge Functions (deno check)
    runs-on: ubuntu-latest
    # Warn-only for now: this is the first time the 90 Deno edge functions are
    # type-checked in CI, so surface results without blocking merges. Flip to
    # blocking (remove continue-on-error) once the baseline is confirmed clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check edge functions
        run: |
          set -o pipefail
          # Check every TypeScript file under supabase/functions. Function
          # entrypoints transitively pull in the _shared utilities.
          mapfile -t FILES < <(find supabase/functions -name '*.ts' | sort)
          echo "Found ${#FILES[@]} edge-function TypeScript files."
          deno check "${FILES[@]}"

  migrations:
    name: SQL Migrations (structural lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate migration structure
        run: node scripts/validate-migrations.mjs

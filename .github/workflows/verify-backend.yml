name: Verify Backend

# Verifies the parts of the PRD that cannot be exercised by the frontend
# typecheck/test/build pipeline: the Deno edge functions and the SQL migrations.
# These run against URL-imported dependencies (deno.land / esm.sh) that are only
# reachable from GitHub-hosted runners, so this is the authoritative verification
# path for those items.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  edge-functions:
    name: Edge Functions (deno check)
    runs-on: ubuntu-latest
    # Blocking: the deno-check baseline has been cleared (114 -> 0). New
    # genuine type errors in edge functions now fail CI. (Strictness is relaxed
    # via supabase/functions/deno.json strict:false; genuine errors like wrong
    # arg counts / missing properties are still caught.)
    steps:
      - uses: actions/checkout@v7

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check edge functions
        run: |
          set -o pipefail
          # Check every TypeScript file under supabase/functions. Function
          # entrypoints transitively pull in the _shared utilities.
          mapfile -t FILES < <(find supabase/functions -name '*.ts' | sort)
          echo "Found ${#FILES[@]} edge-function TypeScript files."
          # --node-modules-dir=auto lets Deno resolve npm: specifiers that some
          # functions pull in transitively (e.g. optimize-image ->
          # imagemagick_deno -> npm:@imagemagick/magick-wasm). Without it,
          # `deno check` aborts on the first npm: import before type-checking.
          # --config points at the edge-function deno.json (strict:false for
          # the Deno runtime — these functions weren't written to strict TS;
          # genuine type errors like wrong arg counts / missing properties are
          # still caught).
          deno check --config supabase/functions/deno.json --node-modules-dir=auto "${FILES[@]}"

  migrations:
    name: SQL Migrations (structural lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate migration structure
        run: node scripts/validate-migrations.mjs
